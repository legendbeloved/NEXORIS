<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{subject}}</title>
  </head>
  <body style="margin:0;padding:0;background:#0b0c1a;color:#e5e7eb;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0b0c1a;padding:24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:640px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.10);border-radius:18px;overflow:hidden;">
            <tr>
              <td style="padding:18px 20px;border-bottom:1px solid rgba(255,255,255,0.08);">
                <div style="display:flex;align-items:center;gap:10px;">
                  <div style="width:10px;height:10px;border-radius:999px;background:#5B4CF5;box-shadow:0 0 14px rgba(91,76,245,0.45);"></div>
                  <div style="font-weight:800;letter-spacing:0.06em;text-transform:uppercase;">NEXORIS</div>
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:22px 20px 12px 20px;">
                {{body_html}}
              </td>
            </tr>
            <tr>
              <td style="padding:14px 20px 20px 20px;color:#9ca3af;font-size:12px;line-height:1.5;">
                <div style="border-top:1px solid rgba(255,255,255,0.08);padding-top:14px;">
                  Sent by NEXORIS Outreach Intelligence · {{city}}
                </div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
    {{tracking_pixel}}
  </body>
</html>
